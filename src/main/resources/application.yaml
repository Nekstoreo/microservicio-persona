server:
  port: 8081

spring:
  application:
    name: microservicio-persona
  datasource:
    url: jdbc:mysql://localhost:3306/microservicio_persona
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    locations: classpath:db/migration
  
logging:
  level:
    root: INFO
    com.onclass: DEBUG
