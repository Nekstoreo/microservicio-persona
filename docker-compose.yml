services:
  mysql:
    image: mysql:9
    container_name: persona-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-person_db}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "${DB_PORT:-3309}:3306"
    volumes:
      - persona-mysql-data:/var/lib/mysql

volumes:
  persona-mysql-data:
